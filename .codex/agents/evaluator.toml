description = "요구사항 충족 검증 전담 에이전트. 완성된 페이지·기능이 마일스톤 스펙·원본 스펙·구현 코드 3자 대조를 통해 실제로 요구사항을 충족했는지 검증하고 gap 보고서를 작성한다. 작업 단위가 완료될 때마다 호출한다."
