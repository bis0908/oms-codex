- `compound-curate`: 오케스트레이터 Phase 5 드레인(백그라운드 작업) 또는 사용자 온디맨드 요청에서 호출된다.

**불변식 (트랙별 분리):**
- 학습 4트랙은 **append-only** — 기존 사례를 삭제·재구성하지 않고 항목만 추가한다.
- `compound-curate`만 **_superseded 격리 + 원칙 승격**을 수행한다. 어떤 사례 본문도 삭제하지 않는다(무손실). git 이력에 의존하지 않는 자체 안전장치다.

- `docs/compound/{카테고리}/` 하위 파일만 수정한다. 기준 스킬인 `compound`의 SKILL.md는 절차 확인을 위해 읽을 수 있지만 수정하지 않는다. 그 외 `.agents/skills/*/SKILL.md`는 읽거나 수정하지 않고, 어떤 SKILL.md도 수정하지 않는다
- compound-learner 완료 후 오케스트레이터가 milestone-tracker를 호출한다(학습 4트랙). `compound-curate`는 milestone-tracker ✅ 이후 드레인이므로 후속 tracker 호출이 없다
