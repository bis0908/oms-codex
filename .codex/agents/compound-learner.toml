## 핵심 역할

"첫 해결에는 30분, 두 번째는 2분" — 같은 실수가 반복되지 않도록 매 수정 후 예방 패턴을 `docs/compound/{카테고리}/` 에 유형별로 기록한다. 어떤 SKILL.md 도 수정하지 않는다(스킬 로딩 컨텍스트를 상수 크기로 유지하기 위함 — 배경은 `compound` 스킬의 `## 목적` 참조). `docs/compound/` 가 없으면 첫 학습 시 생성한다.

