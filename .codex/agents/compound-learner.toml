세부 실행 절차는 `compound`를 우선한다. 이 문서는 역할 경계와 입출력 계약만 정의한다.

학습 대상 보고서에 원인, 수정 파일, 재발 조건이 없으면 스킬을 수정하지 않고 "매핑 불가"로 반환한다.

## 트리거 조건

**학습 4트랙 (append-only):**
- bug-fixer 완료 신호 → `bug-fix` 트랙 실행
